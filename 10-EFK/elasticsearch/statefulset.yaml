apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch
  namespace: logging
spec:
  serviceName: "elasticsearch"
  replicas: 3
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      initContainers:
        - name: fix-permissions
          image: busybox
          command: ["sh", "-c", "chown -R 1000:1000 /usr/share/elasticsearch/data"]
          # ES runs as UID 1000. EBS volumes are root-owned by default,
          # so this init container fixes ownership before ES starts
          volumeMounts:
            - name: data
              mountPath: /usr/share/elasticsearch/data
        - name: increase-vm-max-map
          image: busybox
          command: ["sysctl", "-w", "vm.max_map_count=262144"]
          # Elasticsearch requires vm.max_map_count >= 262144.
          # This sysctl call runs on the node kernel (privileged)
          securityContext:
            privileged: true
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
          env:
            - name: cluster.name
              value: "eks-logs"
            - name: node.name
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name # Pod name (e.g. elasticsearch-0).
                  # Each pod gets a stable identity via StatefulSet — this
                  # makes cluster.initial_master_nodes deterministic
            - name: discovery.seed_hosts
              value: "elasticsearch-0.elasticsearch,elasticsearch-1.elasticsearch,elasticsearch-2.elasticsearch"
              # Headless Service gives each pod a DNS entry:
              # <pod>.<service>.<namespace>.svc.cluster.loca
            - name: cluster.initial_master_nodes
              value: "elasticsearch-0,elasticsearch-1,elasticsearch-2"
            - name: ES_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
            - name: xpack.security.enabled
              value: "false"      # Disable TLS/auth for simplicity
                                  # Eneble in production with certs.
          ports: 
            - containerPort: 9200 # Rest API (used by Fludent Bit & Kibana)
            - containerPort: 9300 # Inter-node cluster Ttransport
          volumeMounts:
            - name: data
              mountPath: /usr/share/elasticsearch/data
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: "gp2"
        resources:
          requests:
            storage: 30Gi
        # StatefulSet creates one PVC per pod: data-elasticserach-0,
        # data-elasticsearch-1, data-elasticsearch. They survice pod restarts.