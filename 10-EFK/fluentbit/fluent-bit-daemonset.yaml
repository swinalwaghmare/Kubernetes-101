apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: logging
spec:
  selector: 
    matchLabels:
      app: fluent-bit
  template:
    metadata:
      labels:
        app: fluent-bit
    spec:
      serviceAccountName: fluent-bit # Use the SA we created with cluster read access.
      # toleration:
      #   - key: node-role.kubernetes.io/master
      #     operator: Exists
      #     effect: NoSchedule
      #   # By default, DaemonSet pods don't run on master/control-plane nodes.
      #   # This toleration allows it. Remove if you don't want logs from masters
      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:2.2
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "126Mi"
              cpu: "200m"
          volumeMounts:
            - name: varlog
              mountPath: /var/log
              readOnly: true
              # Mounts the host's /var/log so Fluent Bit can read
              # /var/log/containers/*.log files
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
              # The actual log files live here; /var/log/containers/ symlinks
              # to them. We must mount both or the symlinks are broken
            - name: fluent-bit-config
              mountPath: /fluent-bit/etc/
              # Mounts our ConfigMap as files in the config directory.
            # - name: fluent-bit-state
            #   mountPath: /var/fluent-bit/state
      volumes:
        - name: varlog
          hostPath: 
            path: /var/log
            # hostPath mounts a path from the node's filesystem.
            # This is appropriate for log collection — Fluent Bit needs
            # to reach files outside the container
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: fluent-bit-config
          configMap:
            name: fluent-bit-config
            # References the ConfigMap by name. Kubernetes mounts each
            # data key as a file (fluent-bit.conf, parsers.conf).
        # - name: fluent-bit-state
        #   hostPath:
        #     path: /var/fluent-bit/state
        #     type: DirectoryOrCreate