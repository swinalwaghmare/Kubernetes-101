apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-pod
  labels:
    app: nginx-pod
spec:
  replicas: 4
  selector:
    matchLabels:
      app: nginx-pod
  template:
    metadata:
      labels:
        app: nginx-pod
  # Configure a topology spread constraint
    spec:
      topologySpreadConstraints:
      - maxSkew: 1

        topologyKey: kubernetes.io/hostname # spread across nodes
        # topologyKey: topology.kubernetes.io/zone -> spread across availabilty zoness

        whenUnsatisfiable: DoNotSchedule
        # DoNotSchedule -> If rule break pod will not created and pod stays pending
        # ScheduleAnyway -> Scheduler tries best but still schedules, still place pod somewhere


        labelSelector:
          matchLabels:
            app: nginx-pod
        # matchLabelKeys: 
        # nodeAffinityPolicy: [ Honor|Ignore ] # optional; beta since v1.26
        # nodeTaintsPolicy: [ Honor|Ignore ] # optional; beta since v1.26
        ### other Pod fields go here
      containers:
      - name: nginx-container
        image: nginx
